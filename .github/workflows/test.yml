name: Run Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: testing-env  # Uncomment if using environment secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run ruff format check
        run: uv run ruff format --check plane_mcp/

      - name: Run ruff linter
        run: uv run ruff check plane_mcp/

      - name: Start MCP Server (HTTP mode)
        run: |
          # Start the server in the background
          uv run python -m plane_mcp http &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready (up to 30 seconds)
          for i in {1..30}; do
            if curl -s http://localhost:8211/mcp > /dev/null 2>&1; then
              echo "MCP Server is ready"
              break
            fi
            sleep 1
          done
          
          # Verify server is running
          if ! curl -s http://localhost:8211/mcp > /dev/null 2>&1; then
            echo "Error: MCP Server failed to start"
            exit 1
          fi

      - name: Run HTTP tests (non-OAuth)
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_TEST_API_KEY: ${{ secrets.PLANE_API_KEY }}
          PLANE_TEST_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_TEST_MCP_URL: http://localhost:8211
          PLANE_BASE_URL: ${{ secrets.PLANE_BASE_URL || 'https://api.plane.so' }}
        run: |
          # Run only HTTP and integration tests (skip OAuth)
          uv run pytest \
            tests/test_stateless_http.py \
            tests/test_integration.py \
            -v \
            -m "not oauth"

      - name: Run OAuth tests (if credentials available)
        env:
          PLANE_OAUTH_PROVIDER_CLIENT_ID: ${{ secrets.PLANE_OAUTH_PROVIDER_CLIENT_ID }}
          PLANE_OAUTH_PROVIDER_CLIENT_SECRET: ${{ secrets.PLANE_OAUTH_PROVIDER_CLIENT_SECRET }}
          PLANE_OAUTH_PROVIDER_BASE_URL: http://localhost:8211
          PLANE_BASE_URL: ${{ secrets.PLANE_BASE_URL}}
          PLANE_INTERNAL_BASE_URL: ${{ secrets.PLANE_INTERNAL_BASE_URL}}
        if: ${{ env.PLANE_OAUTH_PROVIDER_CLIENT_ID != '' && env.PLANE_OAUTH_PROVIDER_CLIENT_SECRET != '' }}
        run: |
          # Run only OAuth tests
          uv run pytest \
            tests/test_oauth_security.py \
            -v \
            -m "oauth"

      - name: Stop MCP Server
        if: always()
        run: |
          if [ -n "${{ env.SERVER_PID }}" ]; then
            kill ${{ env.SERVER_PID }} 2>/dev/null || true
            wait ${{ env.SERVER_PID }} 2>/dev/null || true
          fi