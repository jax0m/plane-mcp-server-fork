name: Stdio Integration Tests

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  stdio-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testing-env # Uncomment if using environment secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run pre-commit against all failures
        run: uv run pre-commit run --all-files

      - name: Validate environment variables
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_TEST_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_TEST_WORKSPACE_SLUG }}
          PLANE_BASE_URL: ${{ secrets.PLANE_TEST_BASE_URL }}
        run: |
          if [ -z "$PLANE_API_KEY" ]; then
            echo "❌ ERROR: PLANE_TEST_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "$PLANE_WORKSPACE_SLUG" ]; then
            echo "❌ ERROR: PLANE_TEST_WORKSPACE_SLUG secret is not configured"
            exit 1
          fi
          echo "✓ Required secrets are configured"
          echo "  PLANE_BASE_URL: ${PLANE_BASE_URL:-https://api.plane.so}"
          echo "  PLANE_WORKSPACE_SLUG: $PLANE_WORKSPACE_SLUG"
          echo "  PLANE_API_KEY: ${PLANE_API_KEY:0:10}..."

      - name: Test API connectivity
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_TEST_API_KEY }}
          PLANE_BASE_URL: ${{ secrets.PLANE_TEST_BASE_URL || 'https://api.plane.so' }}
        run: |
          echo "Testing Plane API connectivity..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $PLANE_API_KEY" \
            "$PLANE_BASE_URL/api/me/" || echo "000")
          echo "API response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Warning: API returned $HTTP_CODE (expected 200)"
            echo "   This may indicate an API key or workspace permission issue"
          else
            echo "✓ API connectivity verified"
          fi

      - name: Run stdio integration tests
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_TEST_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_TEST_WORKSPACE_SLUG }}
          PLANE_BASE_URL: ${{ secrets.PLANE_TEST_BASE_URL || 'https://api.plane.so' }}
        run: |
          # Make test script executable
          chmod +x scripts/test_stdio.sh

          # Run the stdio test suite
          ./scripts/test_stdio.sh -v

      - name: Test results summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Stdio Integration Test Run Complete"
          echo "=========================================="
          echo "Tests validate:"
          echo "  ✓ Tool availability"
          echo "  ✓ Project lifecycle (create → update → delete → verify)"
          echo "  ✓ Work item lifecycle (create → retrieve → delete → verify)"
          echo "  ✓ Resource cleanup after test failures"
          echo "=========================================="

