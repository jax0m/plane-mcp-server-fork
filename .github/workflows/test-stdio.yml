name: Stdio Integration Tests

on: [push, pull_request]

env:
  PYTHON_VERSION: "3.11"

jobs:
  pre_commit_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pre_commit_checks
        uses: pre-commit/action@v3.0.1

  test_stdio:
    runs-on: ubuntu-latest
    environment: testing-env # Uncomment if using environment secrets
    needs: pre_commit_checks
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Validate environment variables
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_TEST_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_TEST_WORKSPACE_SLUG }}
          PLANE_BASE_URL: ${{ secrets.PLANE_TEST_BASE_URL }}
        run: |
          if [ -z "$PLANE_API_KEY" ]; then
            echo "❌ ERROR: PLANE_TEST_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "$PLANE_WORKSPACE_SLUG" ]; then
            echo "❌ ERROR: PLANE_TEST_WORKSPACE_SLUG secret is not configured"
            exit 1
          fi
          echo "✓ Required secrets are configured"
          echo "  PLANE_BASE_URL: ${PLANE_BASE_URL:-https://api.plane.so}"
          echo "  PLANE_WORKSPACE_SLUG: $PLANE_WORKSPACE_SLUG"
          echo "  PLANE_API_KEY: ${PLANE_API_KEY:0:10}..."

      - name: Run stdio integration tests
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_TEST_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_TEST_WORKSPACE_SLUG }}
          PLANE_BASE_URL: ${{ secrets.PLANE_TEST_BASE_URL || 'https://api.plane.so' }}
        run: |
          # Make test script executable
          chmod +x scripts/test_stdio.sh

          # Run the stdio test suite
          ./scripts/test_stdio.sh -v
