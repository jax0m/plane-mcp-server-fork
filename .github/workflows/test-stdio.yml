name: Stdio Integration Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  stdio-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Validate environment variables
        run: |
          if [ -z "${{ secrets.PLANE_API_KEY }}" ]; then
            echo "Error: PLANE_API_KEY secret is required"
            exit 1
          fi
          if [ -z "${{ secrets.PLANE_WORKSPACE_SLUG }}" ]; then
            echo "Error: PLANE_WORKSPACE_SLUG secret is required"
            exit 1
          fi
          echo "✓ Required secrets are configured"

      - name: Run stdio integration tests
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_BASE_URL: ${{ secrets.PLANE_BASE_URL || 'https://api.plane.so' }}
        run: |
          # Make test script executable
          chmod +x scripts/test_stdio.sh
          
          # Run the stdio test suite
          ./scripts/test_stdio.sh -v

      - name: Test results summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Stdio Integration Test Run Complete"
          echo "=========================================="
          echo "Tests validate:"
          echo "  ✓ Tool availability"
          echo "  ✓ Project lifecycle (create → update → delete → verify)"
          echo "  ✓ Work item lifecycle (create → retrieve → delete → verify)"
          echo "  ✓ Resource cleanup after test failures"
          echo "=========================================="

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Check code formatting
        run: uv run ruff format --check plane_mcp/ tests/

      - name: Run linter
        run: uv run ruff check plane_mcp/ tests/

  validate:
    runs-on: ubuntu-latest
    needs: [stdio-tests, lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.stdio-tests.result }}" != "success" ]; then
            echo "❌ Stdio tests failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Lint checks failed"
            exit 1
          fi
          echo "✅ All validation checks passed"
